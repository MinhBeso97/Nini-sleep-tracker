<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nini Sleep Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        @media (min-width: 600px) {
            .main-layout { display: flex; gap: 20px; }
            .left-side { flex: 1.5; }
            .right-side { flex: 1; }
        }
        .header { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .input-box { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: black; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background: #333; }
        .chart-area { height: 220px; margin-top: 15px; position: relative; }
        
        /* Ô sức khỏe */
        .health-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 150px;
        }
        .status-box {
            padding: 15px;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            margin: 10px 0;
            border: 2px solid #ccc;
        }
        .bg-empty { background: #eee; color: #666; }
        .bg-green { background: #d1fae5; color: #065f46; border-color: #10b981; }
        .bg-yellow { background: #fef3c7; color: #92400e; border-color: #f59e0b; }
        .bg-red { background: #fee2e2; color: #b91c1c; border-color: #ef4444; }
        .clear-btn { background: none; color: #999; border: 1px solid #ccc; margin-top: 10px; font-size: 12px; }
        .clear-btn:hover { background: #fee2e2; color: red; border-color: red; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">🐻 Nini Sleep Tracker</div>
    
    <div class="main-layout">
        <div class="left-side">
            <div class="input-box">
                <label>Ngày ngủ</label>
                <input type="date" id="txtDate">
            </div>
            <div class="input-box">
                <label>Số giờ ngủ (tiếng)</label>
                <input type="number" id="txtHours" placeholder="Nhập số, VD: 7.5" step="0.5" min="0" max="24">
            </div>
            <button onclick="handleBtnAdd()">+ Add Sleep</button>
            
            <div class="chart-area">
                <canvas id="mySleepChart"></canvas>
            </div>
        </div>
        
        <div class="right-side">
            <div class="health-card">
                <div style="font-weight: bold;">Sức khỏe hôm nay</div>
                <div id="divStatus" class="status-box bg-empty">-- h</div>
                <div id="lblMessage" style="font-size: 13px; color: #666;">Chưa có dữ liệu</div>
                <button class="clear-btn" onclick="handleBtnClear()">Xóa hết dữ liệu</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Set ngày hôm nay làm mặc định
    document.getElementById('txtDate').valueAsDate = new Date();

    // Khởi tạo đồ thị
    const ctx = document.getElementById('mySleepChart').getContext('2d');
    let myChart = new Chart(ctx, {
        type: 'bar',
        data: { labels: [], datasets: [{ label: 'Giờ ngủ', data: [], backgroundColor: 'black', borderRadius: 4 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });

    // Lấy dữ liệu cũ từ máy
    function loadSavedData() {
        let data = localStorage.getItem('niniData');
        return data ? JSON.parse(data) : [];
    }

    // Cập nhật giao diện
    function refreshScreen() {
        let list = loadSavedData();
        
        // Sắp xếp ngày
        list.sort((a,b) => new Date(a.d) - new Date(b.d));
        
        // Cắt lấy 7 ngày gần nhất
        let recent = list.slice(-7);
        
        // Đưa vào biểu đồ
        myChart.data.labels = recent.map(item => item.d.substring(5).replace('-', '/')); // lấy định dạng MM/DD
        myChart.data.datasets[0].data = recent.map(item => item.h);
        myChart.update();

        // Xử lý ô sức khỏe
        let divStatus = document.getElementById('divStatus');
        let lblMessage = document.getElementById('lblMessage');
        
        if (recent.length === 0) {
            divStatus.className = "status-box bg-empty";
            divStatus.innerText = "-- h";
            lblMessage.innerText = "Chưa có dữ liệu giấc ngủ";
        } else {
            let lastItem = recent[recent.length - 1];
            let h = lastItem.h;
            divStatus.innerText = h + " giờ";
            
            if (h >= 8 {
                divStatus.className = "status-box bg-green";
                lblMessage.innerText = "Tuyệt vời! Bạn ngủ rất đủ giấc.";
            } else if (h >= 6) {
                divStatus.className = "status-box bg-yellow";
                lblMessage.innerText = "Tạm ổn, cố gắng ngủ thêm xíu nhé.";
            } else {
                divStatus.className = "status-box bg-red";
                lblMessage.innerText = "Thiếu ngủ trầm trọng rồi nha!";
            }
        }
    }

    // Nút Thêm dữ liệu
    function handleBtnAdd() {
        let dateVal = document.getElementById('txtDate').value;
        let hoursVal = parseFloat(document.getElementById('txtHours').value);

        if (!dateVal || isNaN(hoursVal) || hoursVal <= 0 || hoursVal > 24) {
            alert("Vui lòng điền ngày và số giờ hợp lệ từ 0.5 đến 24!");
            return;
        }

        let list = loadSavedData();
        let idx = list.findIndex(item => item.d === dateVal);
        
        if (idx !== -1) {
            list[idx].h = hoursVal; // Trùng ngày thì cập nhật lại số giờ
        } else {
            list.push({ d: dateVal, h: hoursVal });
        }

        localStorage.setItem('niniData', JSON.stringify(list));
        document.getElementById('txtHours').value = "";
        refreshScreen();
    }

    // Nút Xóa hết
    function handleBtnClear() {
        if (confirm("Bạn có muốn xóa toàn bộ lịch sử không?")) {
            localStorage.removeItem('niniData');
            refreshScreen();
        }
    }

    // Chạy khi mở trang
    refreshScreen();
</script>

</body>
</html>
